name: Test Builds on PRs
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Test Builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod tidy

      - name: Test build
        id: test
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go vet ./...

      - name: Run test
        run: go test ./... -v