name: Build, Release & Docker

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========== Build GoCI-DNS ==========
  build:
    name: Build Golang App
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifacts: ${{ steps.build.outputs.artifacts }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=dev-$(date +%Y%m%d-%H%M%S)
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Build binaries
        id: build
        run: |
          mkdir -p ./dist
          
          # Linux amd64
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-X main.Version=${{ steps.version.outputs.version }}" \
            -o ./dist/app-linux-amd64 ./cmd/app
          
          # Linux arm64
          GOOS=linux GOARCH=arm64 go build \
            -ldflags="-X main.Version=${{ steps.version.outputs.version }}" \
            -o ./dist/app-linux-arm64 ./cmd/app
          
          # macOS amd64
          GOOS=darwin GOARCH=amd64 go build \
            -ldflags="-X main.Version=${{ steps.version.outputs.version }}" \
            -o ./dist/app-darwin-amd64 ./cmd/app
          
          # macOS arm64
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-X main.Version=${{ steps.version.outputs.version }}" \
            -o ./dist/app-darwin-arm64 ./cmd/app
          
          # Windows amd64
          GOOS=windows GOARCH=amd64 go build \
            -ldflags="-X main.Version=${{ steps.version.outputs.version }}" \
            -o ./dist/app-windows-amd64.exe ./cmd/app
          
          ls -lah ./dist/
          echo "artifacts=./dist" >> $GITHUB_OUTPUT

      - name: Generate checksums
        run: |
          cd ./dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: binaries
          path: dist/
          retention-days: 1

  # ========== GitHub Release ==========
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          name: binaries
          path: dist/

      - name: Create release notes
        id: release_notes
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ## Changelog
          
          - Build version: ${{ needs.build.outputs.version }}
          - Built with Go $(go version)
          
          ### Binaries included:
          - Linux x86_64 (amd64)
          - Linux ARM64 (aarch64)
          - macOS Intel (amd64)
          - macOS Apple Silicon (arm64)
          - Windows x86_64 (amd64)
          
          ### Verification
          Download the SHA256SUMS file and verify:
          \`\`\`bash
          sha256sum -c SHA256SUMS
          \`\`\`
          EOF
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            dist/app-*
            dist/SHA256SUMS
          bodyFile: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========== Docker Image ==========
  docker:
    name: Build & Push Docker Image
    needs: build
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          name: binaries
          path: dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=${{ needs.build.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.build
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.build.outputs.version }}
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

      - name: Image digest
        run: |
          echo "Image pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"