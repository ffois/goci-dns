# goci-dns configuration file


# ------- CHECKER STUFF ---------
# How often (minutes) to check the DNS.
#   0  = one-shot mode  → use with a cron job
#   >0 = daemon mode    → use with a systemd service (runs every N minutes)
TTL_MINUTES_CHECK_DNS_ENTRIES = 5

# If true, always push the update to Cloudflare even when the IP has not changed.
IGNORE_OLD_IP = false

# Hostname that is resolved (like pinging it) to discover the current public IP.
DOMAIN_TO_RESOLVE = i59n5i62jw4mazmm.myfritz.net

# If true, push NEW_IP to Cloudflare instead of the resolved address.
OVERRIDE_NEW_IP = false

# Static IP to use when OVERRIDE_NEW_IP = true.
NEW_IP =



# ------- CF STUFF ---------
# API token with "Zone – DNS – Edit" permission.
CF_TOKEN = your-cloudflare-api-token

# Zone ID of the domain whose DNS records you want to update.
CF_ZONE_ID = your-zone-id

# Account ID (currently informational, reserved for future use).
CF_ACCOUNT_ID = your-account-id

# Semicolon-separated list of DNS record IDs to update.
# You can find these in the Cloudflare dashboard or via the API.
CF_DNS_ENTRIES_ID = record-id-1;record-id-2

